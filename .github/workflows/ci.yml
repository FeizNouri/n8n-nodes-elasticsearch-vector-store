name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Type-check & build
        run: npm run build

      - name: Verify dist contents
        run: |
          test -f dist/credentials/ElasticsearchVectorApi.credentials.js
          test -f dist/nodes/VectorStoreElasticsearch/VectorStoreElasticsearch.node.js
          test -f dist/nodes/VectorStoreElasticsearch/elasticsearchVectorStore.svg
          test -f dist/vectorstore/ElasticVectorSearch.js

      - name: Verify no @langchain/community in the tree
        run: |
          ! test -d node_modules/@langchain/community
          ! grep -q '"@langchain/community"' package.json

      - name: Inspect npm tarball contents
        run: npm pack --dry-run
